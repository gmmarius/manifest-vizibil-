<canvas id="canvas"></canvas>

<script>
const text = `

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function draw() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  ctx.fillStyle = "#080808";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  let cx = canvas.width / 2;
  let cy = canvas.height / 2;
  let radius = 8;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const code = char.charCodeAt(0);

    const angle = i * 0.19;
    radius += 0.055;

    const x = cx + Math.cos(angle) * radius + Math.sin(code) * 12;
    const y = cy + Math.sin(angle) * radius + Math.cos(code) * 12;

    const size = 1.5 + (code % 9);
    const alpha = 0.18 + ((code % 80) / 120);

    const r = 120 + (code % 130);
    const g = 70 + ((code * 3) % 160);
    const b = 130 + ((code * 7) % 120);

    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;

    if (char === "💞") {
      ctx.fillStyle = "rgba(255, 120, 180, 0.95)";
    }

    if (char === "🙂") {
      ctx.fillStyle = "rgba(255, 220, 120, 0.85)";
    }

    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.strokeStyle = "rgba(255,255,255,0.08)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(cx, cy, Math.min(canvas.width, canvas.height) * 0.32, 0, Math.PI * 2);
  ctx.stroke();
}

draw();
window.addEventListener("resize", draw);
</script>
