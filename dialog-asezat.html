    let size = 1.3 + (p.code % 10) * 0.45;

    if (p.ch === "💞") { r = 255; g = 105; b = 190; alpha = 0.95; size += 2.5; }
    if (p.ch === "🙂") { r = 255; g = 220; b = 105; alpha = 0.9; size += 1.8; }
    if (p.ch === "(" || p.ch === ")") { r = 165; g = 235; b = 255; alpha = 0.82; size += 0.7; }

    ctx.fillStyle = "rgba(" + r + "," + g + "," + b + "," + Math.min(alpha, 0.95) + ")";
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fill();
  }

  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, minSide * 0.48);
  grd.addColorStop(0, "rgba(255,255,255,0.10)");
  grd.addColorStop(0.28, "rgba(180,120,255,0.055)");
  grd.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(cx, cy, minSide * 0.48, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "rgba(255,255,255,0.12)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(cx, cy, minSide * 0.42, 0, Math.PI * 2);
  ctx.stroke();
}

try {
  draw();
  window.addEventListener("resize", draw);
} catch (error) {
  ctx.fillStyle = "#ffffff";
  ctx.font = "18px monospace";
  ctx.fillText("Eroare la desenare: " + error.message, 30, 60);
  console.error(error);
}
</script>
